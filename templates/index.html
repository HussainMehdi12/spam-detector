<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spam Detector</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border-radius: 20px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-custom {
            background: #ff7a18;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #ff4b2b;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .spam { color: red; }
        .ham { color: green; }

        footer {
            text-align: center;
            padding: 10px;
            color: white;
        }
    </style>
</head>

<body>

<div class="main-container">
    <div class="card text-center bg-white">

        <h2>📩 AI Spam Detector</h2>
        <p class="text-muted">Detect spam messages using Machine Learning</p>

        <form action="/predict" method="post">
            <input type="text" name="message" class="form-control mb-3"
                   placeholder="Enter your message..." required>

            <button type="submit" class="btn btn-custom w-100">Check Message</button>
        </form>

        {% if prediction %}
            <div class="result {% if prediction == '🚫 SPAM' %}spam{% else %}ham{% endif %}">
                {{ prediction }}
            </div>
            <p>Confidence: {{ confidence }}%</p>
        {% endif %}

    </div>
</div>

<footer>
    <p>© 2026 Spam Detector | Built with ❤️ using Flask</p>
</footer>

</body>
</html>
